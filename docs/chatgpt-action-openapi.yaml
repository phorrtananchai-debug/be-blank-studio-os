openapi: 3.1.0
info:
  title: Be Blank Studio OS Agent API
  version: 1.0.0
  description: ChatGPT Action schema for creating and updating Be Blank Studio OS projects in Firebase.
servers:
  - url: https://agent-euweanpera-as.a.run.app
    description: Deployed Be Blank Studio OS agent endpoint.
paths:
  /project:
    post:
      operationId: executeStudioProjectCommand
      summary: Execute a Studio OS project command
      description: Creates, updates, deletes, annotates, or queues calendar work for a Studio OS project.
      security:
        - AgentKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgentCommand"
            examples:
              createProject:
                value:
                  action: create_project
                  payload:
                    name: Ari Lobby Renovation
                    client: Be Blank Client
                    location: Bangkok
                    status: concept
                    startDate: "2026-05-01"
                    handoverDate: "2026-06-15"
                    openingDate: "2026-06-22"
                    notes: Created from ChatGPT Action.
                    nextAction: Confirm project brief.
                    blocker: ""
                    areaSqm: "120"
                    ratePerSqm: "15000"
                    targetCost: "1200000"
                    actualCost: "0"
              updateProject:
                value:
                  action: update_project
                  projectName: Ari Lobby Renovation
                  payload:
                    status: design
                    nextAction: Send updated concept pack.
      responses:
        "200":
          description: Command executed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentResponse"
        "400":
          description: Invalid command.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentResponse"
        "401":
          description: Missing or invalid agent key.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentResponse"
components:
  securitySchemes:
    AgentKey:
      type: apiKey
      in: header
      name: x-agent-key
  schemas:
    AgentCommand:
      type: object
      required:
        - action
      properties:
        action:
          type: string
          enum:
            - create_project
            - update_project
            - delete_project
            - add_note
            - create_calendar_event_later
        projectName:
          type: string
          description: Existing project name for update, delete, note, and calendar actions.
        name:
          type: string
          description: Project name, accepted at top level for convenience.
        note:
          type: string
          description: Note text for add_note.
        payload:
          type: object
          additionalProperties: true
          properties:
            name:
              type: string
            client:
              type: string
            location:
              type: string
            status:
              type: string
            startDate:
              type: string
            handoverDate:
              type: string
            openingDate:
              type: string
            notes:
              type: string
            nextAction:
              type: string
            blocker:
              type: string
            riskLevel:
              type: string
            areaSqm:
              type: string
            ratePerSqm:
              type: string
            projectValue:
              type: string
            targetCost:
              type: string
            actualCost:
              type: string
    AgentResponse:
      type: object
      required:
        - ok
        - action
        - projectId
        - message
      properties:
        ok:
          type: boolean
        action:
          type: string
        projectId:
          type: string
        message:
          type: string
